<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>PoolTimer Dashboard</title>

  <style>
    body {
      margin: 0;
      background: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* ================= MAIN LAYOUT ================= */
    #dashboard {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    /* ================= LEFT PANEL ================= */
    #leftPanel {
      width: 66%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
      box-sizing: border-box;
      position: relative;
    }

    /* ================= RIGHT PANEL ================= */
    #rightPanel {
      width: 34%;
      display: flex;
      flex-direction: column;
      border-left: 2px solid #ddd;
      box-sizing: border-box;
      height: 100vh;
    }

    /* ===== TOP: Leaderboard ===== */
    #leaderboardPanel {
      flex: 0 0 28%;
      padding: 15px;
      border-bottom: 2px solid #ddd;
      overflow: hidden;
    }

    /* ===== MIDDLE: Staff ===== */
    #staffPanel {
      flex: 0 0 32%;
      padding: 15px;
      border-bottom: 2px solid #ddd;
      overflow: hidden;
    }

    /* STAFF GRID (NEW — replaces row layout) */
    .staffGrid {
      display: flex;
      justify-content: space-around;
      align-items: center;
      height: calc(100% - 40px);
      gap: 10px;
    }

    .staffCard {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-align: center;
    }

    .staffRole {
      font-size: 16px;
      font-weight: 700;
      opacity: 0.8;
    }

    .staffCard img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #ccc;
    }

    .staffCard div {
      font-size: 18px;
      font-weight: 600;
    }

    /* ===== BOTTOM: Announcements ===== */
    #messageBoard {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }

    /* ===== Shared title ===== */
    .panelTitle {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    /* ================= HEADER ================= */
    #header {
      margin-top: 10px;
      text-align: center;
      font-size: 34px;
      font-weight: 600;
      line-height: 1.2;
    }

    /* ================= RING ================= */
    #ring-container {
      position: relative;
      width: 560px;
      height: 560px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    svg {
      transform: rotate(-90deg);
      width: 560px;
      height: 560px;
    }

    .track {
      stroke: #e6e6e6;
      stroke-width: 22;
      fill: none;
    }

    .progress {
      stroke-width: 22;
      fill: none;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.5s linear;
    }

    /* ================= CENTER TEXT ================= */
    #countdown {
      position: absolute;
      font-size: 110px;
      font-weight: bold;
      text-align: center;
    }

    #subtitle {
      position: absolute;
      margin-top: 140px;
      font-size: 18px;
      opacity: 0.7;
    }

    /* ================= MODE BLOCK ================= */
    #mode {
      text-align: center;
      margin-top: 5px;
    }

    /* ================= UPCOMING ================= */
    #upcomingReminder {
      margin-top: 10px;
      text-align: center;
      min-height: 34px;
      line-height: 1.2;
    }

    /* ================= ACTIVE REMINDERS ================= */
    #activeReminderBar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;

      display: none;
      align-items: center;
      justify-content: center;

      font-size: 28px;
      font-weight: 700;
      color: white;

      z-index: 9999;
    }

    /* ================= LEADERBOARD ================= */
    #teams {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }

    /* each row */
    #teams div {
      display: flex;
      justify-content: space-between;
      align-items: center;

      padding: 10px 12px;
      border-radius: 10px;

      background: rgba(0, 0, 0, 0.04);
    }

    /* team name */
    #teams div span:first-child {
      font-size: 18px;
      font-weight: 600;
      color: #222;
    }

    /* score */
    #teams div span:last-child {
      font-size: 22px;
      font-weight: 800;
      color: #111;
    }

    /* ================= TOP TEAM BASE (applies glow container feel) ================= */
    #teams div:first-child {
      border-left: 6px solid transparent;
    }

    /* slightly larger emphasis for top row text */
    #teams div:first-child span:first-child {
      font-size: 20px;
    }

    #teams div:first-child span:last-child {
      font-size: 26px;
    }

    /* fade lower teams slightly */
    #teams div:nth-child(n+2) {
      opacity: 0.9;
    }

    /* ================= TEAM COLOR GLOWS (ONLY FIRST PLACE GETS THESE) ================= */

    /* Purple Tiny Turtles */
    #teams div.team-purple {
      background: rgba(160, 90, 255, 0.18);
      border-left-color: #a05aff;
      box-shadow: 0 0 12px rgba(160, 90, 255, 0.25);
    }

    /* Green Goblins */
    #teams div.team-green {
      background: rgba(0, 200, 80, 0.18);
      border-left-color: #00c850;
      box-shadow: 0 0 12px rgba(0, 200, 80, 0.25);
    }

    /* Pink Tropical Swans */
    #teams div.team-pink {
      background: rgba(255, 105, 180, 0.18);
      border-left-color: #ff69b4;
      box-shadow: 0 0 12px rgba(255, 105, 180, 0.25);
    }

    /* Blue team */
    #teams div.team-blue {
      background: rgba(0, 140, 255, 0.18);
      border-left-color: #008cff;
      box-shadow: 0 0 12px rgba(0, 140, 255, 0.25);
    }

    /* ================= MESSAGE ================= */
    #messageText {
      font-size: 18px;
      white-space: pre-wrap;
    }

    /* ================= OVERLAY ================= */
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      color: red;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 140px;
      font-weight: bold;
      z-index: 999;
    }

    /* ================= AUDIO ================= */
    #unlock {
      position: absolute;
      bottom: 10px;
      font-size: 14px;
      opacity: 0.4;
      cursor: pointer;
      z-index: 200;
    }

    #poolLogo {
      position: fixed;
      bottom: 10px;
      left: 10px;
      width: 90px;
      height: 90px;
      opacity: 0.85;
      z-index: 10000;

      transition: none;
    }

    /* when active bar is showing */
    body.barActive #poolLogo {
      bottom: 70px;
    }

    #poolLogo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>

<body>

<div id="dashboard">

  <!-- LEFT -->
  <div id="leftPanel">

    <div id="header">Loading...</div>

    <div id="ring-container">
      <svg>
        <circle class="track" cx="280" cy="280" r="230" />
        <circle id="progress-ring" class="progress" cx="280" cy="280" r="230" />
      </svg>

      <div id="countdown">--:--</div>
      <div id="subtitle">until next rotation</div>
    </div>

    <div id="mode"></div>

    <div id="upcomingReminder"></div>

    <div id="activeReminderBar"></div>

  </div>

  <!-- RIGHT -->
  <div id="rightPanel">

    <!-- LEADERBOARD -->
    <div id="leaderboardPanel">
      <div class="panelTitle">Leaderboard</div>
      <div id="teams"></div>
    </div>

    <!-- STAFF OF WEEK -->
    <div id="staffPanel">
      <div class="panelTitle">Staff of the Week</div>

      <div class="staffGrid">

        <div class="staffCard">
          <div class="staffRole">Lifeguard</div>
          <img id="lifeguardImg" />
          <div id="lifeguardName"></div>
        </div>

        <div class="staffCard">
          <div class="staffRole">WSI</div>
          <img id="wsiImg" />
          <div id="wsiName"></div>
        </div>

      </div>
    </div>

    <!-- ANNOUNCEMENTS -->
    <div id="messageBoard">
    <div class="panelTitle">Announcements</div>
      <div id="messageText"></div>
    </div>

  </div>

</div>

<div id="overlay">ROTATE</div>
<div id="unlock">Tap to enable audio</div>

<script>

let audioEnabled = false;

const audio = {
  warn: new Audio("/sounds/warn.mp3"),
  rotate: new Audio("/sounds/chime.mp3")
};

document.getElementById("unlock").addEventListener("click", async () => {
  audioEnabled = true;
  document.getElementById("unlock").style.display = "none";

  try {
    await audio.warn.play();
    audio.warn.pause();
    audio.warn.currentTime = 0;

    await audio.rotate.play();
    audio.rotate.pause();
    audio.rotate.currentTime = 0;
  } catch (e) {
    console.log("Audio unlock failed:", e);
  }
});

let rotationActive = false;
let lastWarningTrigger = null;

/* ================= RING ================= */

const radius = 230;
const circumference = 2 * Math.PI * radius;

const ring = document.getElementById("progress-ring");
ring.style.strokeDasharray = circumference;
ring.style.strokeDashoffset = circumference;

/* ================= UPDATE LOOP ================= */

async function update() {
  try {
    const res = await fetch("/api/status");
    const data = await res.json();

    const modeIsRed = data.mode === "red";
    const modeColor = modeIsRed ? "#e00000" : "#111111";

    /* ================= TIME ================= */

    const now = new Date(data.currentTime);

    const months = [
      "January","February","March","April","May","June",
      "July","August","September","October","November","December"
    ];

    const month = months[now.getMonth()];
    const day = now.getDate();
    const year = now.getFullYear();

    let hours = now.getHours();
    const minutes = String(now.getMinutes()).padStart(2, "0");

    const ampm = hours >= 12 ? "pm" : "am";
    hours = hours % 12 || 12;

    document.getElementById("header").innerHTML =
      `${month} ${day}, ${year}<br>${hours}:${minutes} ${ampm}`;

    /* ================= COUNTDOWN ================= */

    document.getElementById("countdown").textContent = data.countdownText;

    /* ================= MODE ================= */

    const schedule = Array.isArray(data.schedule) ? data.schedule : [];

    document.getElementById("mode").innerHTML = `
      <div style="line-height:1.1;">
        <div style="color:${modeColor}; font-size:34px; font-weight:600;">
          ROTATE ON ${data.mode.toUpperCase()}
        </div>
        <div style="color:${modeColor}; font-size:20px; font-style:italic; opacity:0.8;">
          ${schedule.map(n => ":" + String(n).padStart(2, "0")).join("   ")}
        </div>
      </div>
    `;

    /* ================= RING ================= */

    const progress = data.progress;
    ring.style.stroke = modeColor;
    ring.style.strokeDashoffset =
      circumference - (progress * circumference);

    /* ================= LEADERBOARD ================= */

    const teams = data.leaderboard || [];

    document.getElementById("teams").innerHTML =
      teams.sort((a,b)=>b.score-a.score)
        .map((t, i) => {
          let teamClass = "";

          if (i === 0) {
            const name = t.name.toLowerCase();

            if (name.includes("purple")) teamClass = "team-purple";
            else if (name.includes("green")) teamClass = "team-green";
            else if (name.includes("pink")) teamClass = "team-pink";
            else if (name.includes("blue")) teamClass = "team-blue";
          }

          return `
            <div class="${teamClass}">
              <span>${i + 1}. ${t.name}</span>
              <span><b>${t.score}</b></span>
            </div>
          `;
        }).join("");

    /* ================= MESSAGE ================= */

    document.getElementById("messageText").innerText =
      data.message || "";



    /* ================= STAFF OF WEEK ================= */

    const staff = data.staffOfWeek || {};

    const lgName = document.getElementById("lifeguardName");
    const lgImg = document.getElementById("lifeguardImg");
    const wsiName = document.getElementById("wsiName");
    const wsiImg = document.getElementById("wsiImg");

    if (lgName && lgImg && wsiName && wsiImg) {
      lgName.textContent = staff.lifeguard?.name || "";
      wsiName.textContent = staff.wsi?.name || "";

      lgImg.src = staff.lifeguard?.image || "";
      wsiImg.src = staff.wsi?.image || "";

      // optional: hide broken images cleanly
      lgImg.style.display = staff.lifeguard?.image ? "block" : "none";
      wsiImg.style.display = staff.wsi?.image ? "block" : "none";
    }

    /* ================= REMINDERS ================= */

    const reminders = Array.isArray(data.reminders) ? data.reminders : [];

    /* ---------------- ACTIVE FIRST ---------------- */
    const active = reminders.find(r => r.isActive);

    /* ---------------- NEXT UP ---------------- */
    const upcoming = reminders
      .filter(r => r.isUpcoming && !r.isActive)
      .sort((a, b) =>
        (a.minutesUntilStart ?? 9999) - (b.minutesUntilStart ?? 9999)
      )[0];

    const reminderToShow = active || upcoming;

    /* ---------------- ELEMENTS ---------------- */
    const upcomingEl = document.getElementById("upcomingReminder");
    const activeBar = document.getElementById("activeReminderBar");

    /* ================= ACTIVE (BOTTOM BAR) ================= */
    if (active) {
      activeBar.style.display = "flex";
      activeBar.textContent = active.title;
      activeBar.style.background = modeColor;

      document.body.classList.add("barActive");
    } else {
      activeBar.style.display = "none";

      document.body.classList.remove("barActive");
    }

    /* ================= UPCOMING / NEXT ================= */
    if (upcoming) {
      upcomingEl.innerHTML = `
        <span style="font-size:26px; font-weight:700; color:${modeColor};">
          Next Rotation:
        </span>
        <span style="font-size:26px; font-weight:700; color:${modeColor};">
          ${upcoming.title}
        </span>
      `;
    } else {
      upcomingEl.textContent = "";
    }

    /* ================= OVERLAY ================= */

    const seconds = data.secondsRemaining;
    const overlay = document.getElementById("overlay");

    if (seconds <= 0 && !rotationActive) {
      rotationActive = true;
      overlay.style.display = "flex";

      if (audioEnabled) audio.rotate.play();

      setTimeout(() => {
        overlay.style.display = "none";
        rotationActive = false;
      }, 6000);
    }

    /* ================= WARNING ================= */

    if (seconds <= 120 && seconds > 119) {
      if (lastWarningTrigger !== data.nextRotation && audioEnabled) {
        audio.warn.play();
        setTimeout(() => audio.warn.play(), 250);
        lastWarningTrigger = data.nextRotation;
      }
    }

    if (seconds > 121) lastWarningTrigger = null;

  } catch (err) {
    console.error(err);
    document.getElementById("mode").textContent = "CONNECTION ERROR";
  }
}

setInterval(update, 1000);
update();

</script>

<div id="poolLogo">
  <img src="/images/logo.png" />
</div>
<div id="activeReminderBar"></div>

</body>
</html>
